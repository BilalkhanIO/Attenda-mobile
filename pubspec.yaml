name: attenda
description: Attenda — Workforce Management Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # QR Code
  mobile_scanner: ^6.0.4
  qr_flutter: ^4.1.0

  # Network info (for IP detection)
  network_info_plus: ^6.1.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.1.2
  firebase_messaging: ^14.9.1

  # Date/Time
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # File/PDF
  url_launcher: ^6.3.1
  open_filex: ^4.7.0
  path_provider: ^2.1.4

  # Utils
  uuid: ^4.4.0
  jwt_decoder: ^2.0.1
  equatable: ^2.0.5

  # Background foreground service (reliable background WiFi monitoring)
  flutter_foreground_task: ^9.0.0

  # Offline queue
  hive_ce: ^2.19.0
  hive_ce_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# App launcher icons — generated from the Attenda brand mark.
# Regenerate after changing the source PNGs with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  # iOS disabled: the iOS project's AppIcon.appiconset isn't scaffolded yet.
  # Enable once iOS is set up, then re-run `dart run flutter_launcher_icons`.
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#081D24"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
