name: attenda
description: Attenda — Workforce Management Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # QR Code
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0

  # Network info (for IP detection)
  network_info_plus: ^5.0.3

  # Connectivity
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.1.2
  firebase_messaging: ^14.9.1

  # Date/Time
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # File/PDF
  url_launcher: ^6.2.6
  open_file: ^3.3.2
  path_provider: ^2.1.3

  # Utils
  uuid: ^4.4.0
  jwt_decoder: ^2.0.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

  # Background tasks
  workmanager: ^0.5.2

  # Offline queue
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # VPN detection
  vpn_status: ^1.1.0

  # Connectivity
  internet_connection_checker: ^1.0.0+1
